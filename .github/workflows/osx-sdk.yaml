name: Pack OSX SDK

on:
  workflow_dispatch:

permissions: {}

jobs:
  build:
    strategy:
      matrix:
        os:
          - macos-14-large
          - macos-15-large

    runs-on: ${{ matrix.os }}
    continue-on-error: true

    permissions:
      id-token: write
      packages: write
      contents: read

    env:
      DOCKER_REGISTRY: "ghcr.io"

    steps:
      # - name: Setup Xcode
      #   uses: maxim-lobanov/setup-xcode@v1
      #   with:
      #     xcode-version: latest
      - name: Set up Docker
        uses: crazy-max/ghaction-setup-docker@6d7cfa65f60a9dda7b46e5513fa982536f3c9877 # v5.3.0
        env:
          SIGN_QEMU_BINARY: 1
          COLIMA_START_ARGS: --cpu 4 --memory 8 --disk 32
          daemon-config: |
            {
              "debug": true,
              "features": {
                "containerd-snapshotter": true
              }
            }
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Checkout osxcross
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          repository: "tpoechtrager/osxcross"
          ref: "f873f534c6cdb0776e457af8c7513da1e02abe59"
          path: "osxcross"

      - name: Build OSX SDK
        id: build_sdk_file
        shell: bash
        run: |
          ./osxcross/tools/gen_sdk_package.sh
          find . -type f -name "*.tar.xz" -print0 | xargs shasum -a 256 | tee sha256sum.txt
          sdk_file=$(find . -name "*.tar.xz" | head -n 1)
          [ -f "$sdk_file" ] && echo "sdk_file: $sdk_file"
          echo "sdk_file=${sdk_file}" >> "$GITHUB_OUTPUT"

      - name: Get Repo Owner
        id: get_repo_owner
        run: echo "repo_owner=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ghcr.io/${{ steps.get_repo_owner.outputs.repo_owner }}/osx-sdk
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ matrix.os }}

      - name: Login to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ env.DOCKER_REGISTRY}}
          username: ${{ steps.get_repo_owner.outputs.repo_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        id: buildpush
        with:
          context: .
          file: Dockerfile.osx_sdk
          build-args: |
            SDK_FILE=${{ steps.build_sdk_file.outputs.sdk_file }}
          push: ${{ github.event_name != 'pull_request' }}
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
