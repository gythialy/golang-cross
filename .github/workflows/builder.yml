name: Build golang-cross-builder

on:
  workflow_dispatch:
    inputs:
      builder-tag:
        description: golang cross builder tag name
        default: v1.26.0-0
      golang-version:
        description: golang version
        default: "1.26.0"
      osxcross-git-hash:
        description: git commit hash of osx-cross project
        default: "ff8d100f3f026b4ffbe4ce96d8aac4ce06f1278b"
      osx-min-version:
        description: minimal macOS SDK deployment target
        default: "10.13"

permissions: {}

jobs:
  build:
    strategy:
      matrix:
        codename:
          - bookworm
          - trixie

    runs-on: ubuntu-latest
    continue-on-error: false

    permissions:
      id-token: write
      packages: write
      contents: read

    env:
      GOLANG_CROSS_TAG: ${{ github.event.inputs.builder-tag }}-${{ matrix.codename }}
      DOCKER_REGISTRY: "ghcr.io"

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.0.1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Get Repo Owner
        id: get_repo_owner
        run: echo "repo_owner=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ghcr.io/${{ steps.get_repo_owner.outputs.repo_owner }}/golang-cross-builder
          tags: |
            type=raw,value=latest,enable=${{ matrix.codename == 'trixie' && github.ref == 'refs/heads/main' }}
            type=raw,value=${{ env.GOLANG_CROSS_TAG }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ steps.get_repo_owner.outputs.repo_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        id: buildpush
        with:
          context: .
          file: Dockerfile.builder
          push: ${{ github.event_name != 'pull_request' }}
          build-args: |
            GO_VERSION=${{ github.event.inputs.golang-version }}
            OSX_VERSION_MIN=${{ github.event.inputs.osx-min-version }}
            OSX_CROSS_COMMIT=${{ github.event.inputs.osxcross-git-hash }}
            OS_CODENAME=${{ matrix.codename }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Sign the images
        run: |
          echo "sign ${STEPS_BUILDPUSH_OUTPUTS_DIGEST}"
          cosign sign --yes "ghcr.io/${STEPS_GET_REPO_OWNER_OUTPUTS_REPO_OWNER}/golang-cross-builder@${STEPS_BUILDPUSH_OUTPUTS_DIGEST}"
        shell: bash
        env:
          STEPS_BUILDPUSH_OUTPUTS_DIGEST: ${{ steps.buildpush.outputs.digest }}
          STEPS_GET_REPO_OWNER_OUTPUTS_REPO_OWNER: ${{ steps.get_repo_owner.outputs.repo_owner }}
