name: Build golang-cross-builder

on:
  workflow_dispatch:
    inputs:
      builder-tag:
        description: golang cross builder tag name
        default: v1.26.4-0
      golang-version:
        description: golang version
        default: "1.26.4"
      osxcross-git-hash:
        description: git commit hash of osx-cross project
        default: "ff8d100f3f026b4ffbe4ce96d8aac4ce06f1278b"
      osx-min-version:
        description: minimal macOS SDK deployment target
        default: "10.13"

permissions: {}

jobs:
  build:
    strategy:
      matrix:
        codename:
          - bookworm
          - trixie

    runs-on: ubuntu-latest
    continue-on-error: false

    permissions:
      id-token: write
      packages: write
      contents: read

    env:
      GOLANG_CROSS_TAG: ${{ github.event.inputs.builder-tag }}-${{ matrix.codename }}
      DOCKER_REGISTRY: "ghcr.io"

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.0.1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Get Repo Owner
        id: get_repo_owner
        run: echo "repo_owner=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ghcr.io/${{ steps.get_repo_owner.outputs.repo_owner }}/golang-cross-builder
          tags: |
            type=raw,value=latest,enable=${{ matrix.codename == 'trixie' && github.ref == 'refs/heads/main' }}
            type=raw,value=${{ env.GOLANG_CROSS_TAG }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ steps.get_repo_owner.outputs.repo_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        id: buildpush
        with:
          context: .
          file: Dockerfile.builder
          push: ${{ github.event_name != 'pull_request' }}
          build-args: |
            GO_VERSION=${{ github.event.inputs.golang-version }}
            OSX_VERSION_MIN=${{ github.event.inputs.osx-min-version }}
            OSX_CROSS_COMMIT=${{ github.event.inputs.osxcross-git-hash }}
            OS_CODENAME=${{ matrix.codename }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Sign the images
        run: |
          echo "sign ${STEPS_BUILDPUSH_OUTPUTS_DIGEST}"
          cosign sign --yes "ghcr.io/${STEPS_GET_REPO_OWNER_OUTPUTS_REPO_OWNER}/golang-cross-builder@${STEPS_BUILDPUSH_OUTPUTS_DIGEST}"
        shell: bash
        env:
          STEPS_BUILDPUSH_OUTPUTS_DIGEST: ${{ steps.buildpush.outputs.digest }}
          STEPS_GET_REPO_OWNER_OUTPUTS_REPO_OWNER: ${{ steps.get_repo_owner.outputs.repo_owner }}
