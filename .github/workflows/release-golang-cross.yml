name: release golang-cross

on:
  release:
    types:
      - created

permissions: {}

jobs:
  release:
    strategy:
      matrix:
        codename:
          - bookworm
          - trixie

    permissions:
      id-token: write
      packages: write
      contents: read

    runs-on: ubuntu-latest
    continue-on-error: false

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: sigstore/cosign-installer@ba7bc0a3fef59531c69a25acd34668d6d3fe6f22 # v4.0.1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Get Repo Owner
        id: get_repo_owner
        run: echo "repo_owner=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ghcr.io/${{ steps.get_repo_owner.outputs.repo_owner }}/golang-cross
          tags: |
            type=raw,value=latest,enable=${{ matrix.codename == 'trixie' && (github.event.release.target_commitish == 'main') }}
            type=semver,pattern={{raw}},enable=${{ matrix.codename == 'trixie' }}
            type=semver,pattern={{version}},enable=${{ matrix.codename == 'trixie' }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ matrix.codename == 'trixie' }}
            type=semver,pattern={{major}},enable=${{ matrix.codename == 'trixie' }}
            type=semver,pattern={{raw}},enable=${{ matrix.codename != 'trixie' }},suffix=-${{ matrix.codename }}
            type=semver,pattern={{version}},enable=${{ matrix.codename != 'trixie' }},suffix=-${{ matrix.codename }}

      - name: Login to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ steps.get_repo_owner.outputs.repo_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        id: buildpush
        with:
          context: .
          build-args: |
            OS_CODENAME=${{ matrix.codename }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Sign the images
        run: |
          echo "sign ${{ steps.buildpush.outputs.digest }}"
          cosign sign --yes "ghcr.io/${{ steps.get_repo_owner.outputs.repo_owner }}/golang-cross@${{ steps.buildpush.outputs.digest }}"
        shell: bash
        env:
          DOCKER_PASSWD: ${{ secrets.GITHUB_TOKEN }}
