name: release golang-cross

on:
  release:
    types:
      - created

permissions: {}

jobs:
  release:
    strategy:
      matrix:
        codename:
          - bookworm
          - trixie

    permissions:
      id-token: write
      packages: write
      contents: read

    runs-on: ubuntu-latest
    continue-on-error: false

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.0.1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Get Repo Owner
        id: get_repo_owner
        run: echo "repo_owner=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ghcr.io/${{ steps.get_repo_owner.outputs.repo_owner }}/golang-cross
          tags: |
            type=raw,value=latest,enable=${{ matrix.codename == 'trixie' && (github.event.release.target_commitish == 'main') }}
            type=semver,pattern={{raw}},enable=${{ matrix.codename == 'trixie' }}
            type=semver,pattern={{version}},enable=${{ matrix.codename == 'trixie' }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ matrix.codename == 'trixie' }}
            type=semver,pattern={{major}},enable=${{ matrix.codename == 'trixie' }}
            type=semver,pattern={{raw}},enable=${{ matrix.codename != 'trixie' }},suffix=-${{ matrix.codename }}
            type=semver,pattern={{version}},enable=${{ matrix.codename != 'trixie' }},suffix=-${{ matrix.codename }}

      - name: Login to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ steps.get_repo_owner.outputs.repo_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        id: buildpush
        with:
          context: .
          build-args: |
            OS_CODENAME=${{ matrix.codename }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Sign the images
        run: |
          echo "sign ${{ steps.buildpush.outputs.digest }}"
          cosign sign --yes "ghcr.io/${{ steps.get_repo_owner.outputs.repo_owner }}/golang-cross@${{ steps.buildpush.outputs.digest }}"
        shell: bash
        env:
          DOCKER_PASSWD: ${{ secrets.GITHUB_TOKEN }}
